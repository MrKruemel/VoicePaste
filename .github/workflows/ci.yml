name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.12"
            name: "Windows"
          - os: ubuntu-22.04
            python-version: "3.12"
            name: "Ubuntu 22.04"
          - os: ubuntu-24.04
            python-version: "3.12"
            name: "Ubuntu 24.04"

    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Linux system dependencies
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            espeak-ng \
            libportaudio2 \
            xclip \
            xdotool \
            python3-tk \
            python3-gi \
            gir1.2-ayatanaappindicator3-0.1 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-mock

      # Linux: install pynput (not in Windows requirements.txt)
      - name: Install Linux Python dependencies
        if: runner.os == 'Linux'
        run: |
          pip install pynput

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a python -m pytest tests/ -v --tb=short -q

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pytest tests/ -v --tb=short -q

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-24.04'
        run: |
          xvfb-run -a python -m pytest tests/ --cov=src --cov-report=term-missing -q
