# VoicePaste Configuration
# Copy this file to config.toml and customize as needed.
#
# IMPORTANT: API keys are stored securely in the OS credential store
# (Windows Credential Manager / Linux keyring via the Settings dialog).
# Use the Settings dialog (right-click tray icon > Settings) to manage API keys.
# If you add keys to this file, they will be automatically migrated to Credential Manager on startup.
#
# Never commit config.toml to version control.
# Never share your config.toml file — it contains your API keys.

[hotkey]
# Global hotkey to start/stop recording (default: "ctrl+alt+r")
# Use format: "ctrl+alt+r", "ctrl+shift+v", "windows+shift+a", etc.
# Supported modifiers: ctrl, shift, alt, windows
# Separate multiple modifiers with +. Key names are case-insensitive.
combination = "ctrl+alt+r"

# Voice Prompt hotkey: record speech, send as prompt to LLM, paste answer (default: "ctrl+alt+a")
# Same format as above. Set to empty string to disable Voice Prompt mode.
prompt_combination = "ctrl+alt+a"

# TTS hotkeys (v0.6): only active when TTS is enabled in Settings
# Read clipboard aloud via Text-to-Speech
# Default: "ctrl+alt+t" (Windows), "ctrl+alt+s" (Linux — avoids GNOME Terminal's Ctrl+Alt+T)
tts_combination = "ctrl+alt+t"
# Ask AI a question and hear the answer via TTS (default: "ctrl+alt+y")
tts_ask_combination = "ctrl+alt+y"
# Note: These hotkeys only work when TTS is enabled. Disable TTS to free up these hotkeys.

# Terminal Mode toggle (v1.3): switch paste between Ctrl+V (GUI) and Ctrl+Shift+V (terminal)
# Useful on Wayland where auto-detection of the focused window is unreliable.
# Press this hotkey to toggle between GUI paste (Ctrl+V) and terminal paste (Ctrl+Shift+V).
# The toggle state resets on restart. Set paste_shortcut in [paste] for a persistent override.
terminal_mode_combination = "ctrl+alt+m"

# Hands-Free hotkey (v0.9): say wake phrase to start recording, silence auto-stops (default: disabled)
# Set to a hotkey like "ctrl+alt+o" to enable, or leave empty to disable.
# Requires microphone and local STT (faster-whisper). Can work with any STT + summarization pipeline.
# handsfree_combination = ""

[api]
# HTTP API Server (v0.9+)
# Allows external programs (scripts, curl, browser extensions, Claude Code) to control Voice Paste via HTTP.
# The server binds to 127.0.0.1 only (no network exposure, localhost-only).
# API is disabled by default for security. Enable in Settings dialog or set to true here.
# WARNING: Only enable if you trust local applications on your machine.
api_enabled = false

# HTTP API port (default: 18923)
# The server will listen on http://127.0.0.1:18923.
# Only change this if port 18923 is already in use on your machine.
api_port = 18923

[transcription]
# STT backend: "cloud" (OpenAI Whisper API) or "local" (faster-whisper, offline, v0.4+)
# - "cloud": requires OpenAI API key. Fast, excellent quality, requires internet.
# - "local": downloads a Whisper model (~75MB–3GB depending on size). Offline, slower, no API key needed.
backend = "cloud"

# Transcription language: "auto" (let Whisper detect) or a language code.
# Examples: "de" (German), "en" (English), "fr" (French), "es" (Spanish)
# "auto" works well for multilingual users but may be slightly less accurate
# than specifying the exact language.
language = "de"

# Audio input device: -1 = system default microphone, or a device index number.
# Use the Settings dialog (right-click tray icon > Settings > Transcription) to
# see available microphones and select one. The device index is shown as (#N).
# audio_device_index = -1

# Local model size (only used when backend = "local")
# Options: tiny (~75MB, fast, lower quality)
#          base (~145MB, good quality, recommended)
#          small (~480MB, better quality)
#          medium (~1.5GB, high quality, slow on CPU)
#          large-v2 (~3GB, highest quality, very slow on CPU)
#          large-v3 (~3GB, newest, very slow on CPU)
model_size = "base"

# Compute device for local STT: "cpu" (works everywhere) or "cuda" (NVIDIA GPU, faster)
device = "cpu"

# Quantization for local STT: "int8" (fastest, CPU), "float16" (GPU), "float32" (highest quality)
compute_type = "int8"

# Voice Activity Detection (Silero VAD): skip silence before Whisper inference
# Improves accuracy on long recordings with pauses. Requires onnxruntime.
# Set to false if transcription crashes in the frozen .exe build (onnxruntime issue with PyInstaller).
# Default: true for script, false for frozen .exe (auto-detected at startup).
vad_filter = true

[summarization]
# Enable text cleanup and summarization (default: true)
# When false, raw transcription is pasted without LLM processing.
enabled = true

# Summarization provider (default: "openai")
# Options:
# - "openai": GPT-4o-mini via OpenAI API. Requires OpenAI API key. Cost: ~$0.0001/call.
# - "openrouter": Access multiple models (GPT, Claude, etc.) via OpenRouter API. Requires OpenRouter key.
# - "ollama": Local LLM via Ollama (http://localhost:11434). Requires Ollama running locally. No API key needed.
provider = "openai"

# Model name (default: "gpt-4o-mini" for OpenAI)
# Examples:
# - "gpt-4o-mini" (OpenAI, fast, cost-effective)
# - "openai/gpt-4o-mini" (OpenRouter, same model via OpenRouter)
# - "claude-3-haiku" (OpenRouter, Anthropic Claude)
# - "llama3.2" (Ollama, requires Ollama running locally)
model = "gpt-4o-mini"

# Custom base URL for summarization API (leave empty to use provider default)
# Use this to override the API endpoint:
# - OpenAI default: "https://api.openai.com/v1"
# - OpenRouter: "https://openrouter.ai/api/v1"
# - Ollama: "http://localhost:11434/v1"
base_url = ""

# Custom system prompt for summarization (leave empty to use default)
# The system prompt controls how the LLM cleans up the transcription.
# Default prompt in German: removes filler words (aehm, also, halt), fixes grammar, preserves key info.
# Leave empty to use the default, or set a custom prompt for your use case.
# Example for professional tone:
#   "Rewrite this transcription as a professional, formal paragraph suitable for business email."
custom_prompt = ""

[tts]
# Text-to-Speech (v0.6 cloud, v0.7 local Piper)
# Reads text aloud using natural AI voices.
# Enable in Settings dialog or set enabled = true here.
enabled = false

# TTS provider: "elevenlabs" (cloud, requires API key) or "piper" (local, offline)
# - "elevenlabs": High-quality cloud voices via ElevenLabs API. Requires internet + ElevenLabs API key.
# - "piper": Local offline synthesis via Piper ONNX models. No API key needed.
#   Download voice models via Settings dialog > Text-to-Speech > Download Model before first use.
provider = "elevenlabs"

# --- Cloud (ElevenLabs) settings ---
# ElevenLabs Voice ID (default: "pFZP5JQG7iQjIQuC4Bku" = Lily)
# Browse voices at: https://elevenlabs.io/voice-library
# You can use any voice ID from your ElevenLabs account.
# Only used when provider = "elevenlabs".
voice_id = "pFZP5JQG7iQjIQuC4Bku"

# ElevenLabs model (default: "eleven_flash_v2_5" = fast, low latency)
# Options:
# - "eleven_flash_v2_5": Fast synthesis, low latency, good quality (recommended)
# - "eleven_multilingual_v2": Higher quality, supports more languages, slower
# Only used when provider = "elevenlabs".
model_id = "eleven_flash_v2_5"

# Audio output format for ElevenLabs.
# Only used when provider = "elevenlabs".
output_format = "mp3_44100_128"

# --- Local (Piper) settings (v0.7) ---
# Piper voice model name. Download models via Settings dialog before first use.
# Models are cached in %LOCALAPPDATA%\VoicePaste\models\tts\ (Windows)
# or ~/.cache/VoicePaste/models/tts/ (Linux).
# Only used when provider = "piper".
#
# German voices (v0.8):
# - "de_DE-thorsten-medium" (~63 MB, recommended, neutral)
# - "de_DE-thorsten-high" (~114 MB, higher quality)
# - "de_DE-thorsten_emotional-medium" (~77 MB, multi-emotion)
# - "de_DE-mls-medium" (~95 MB, alternative voice)
#
# English (US) voices (v0.8):
# - "en_US-ryan-high" (~114 MB, male, high quality)
# - "en_US-ryan-medium" (~64 MB, male, medium quality)
# - "en_US-lessac-high" (~114 MB, male, high quality)
# - "en_US-lessac-medium" (~64 MB, male, medium quality)
# - "en_US-amy-medium" (~64 MB, female)
#
# English (GB) voices (v0.8):
# - "en_GB-cori-high" (~114 MB, female, high quality)
# - "en_GB-cori-medium" (~64 MB, female, medium quality)
# - "en_GB-alba-medium" (~64 MB, female)
# - "en_GB-jenny_dioco-medium" (~64 MB, female)
# - "en_GB-alan-medium" (~64 MB, male)
#
# Full list: See PIPER_VOICE_MODELS in src/constants.py.
local_voice = "de_DE-thorsten-medium"

# Speech speed for Piper local TTS (v1.1)
# Controls the length_scale parameter: lower = slower, higher = faster.
# 0.5 = slow (double duration), 1.0 = normal, 2.0 = fast (half duration)
# Valid range: 0.25 to 4.0. Only used when provider = "piper".
speed = 1.0

[feedback]
# Play audio cues on recording start/stop (default: true)
# When true, you hear distinct beeps for:
# - Recording start: rising tone (up)
# - Recording stop: falling tone (down)
# - Cancel (Escape): two low beeps
# - Error: single low buzz
# Set to false for silent operation.
audio_cues = true

[paste]
# Delayed Paste (v0.9+)
# Delay before pasting in seconds (default: 0 = paste immediately, same as v0.8 and earlier)
# During the delay, you can press Escape to cancel or Enter to paste immediately.
# Useful to ensure your cursor is in the right place before text is pasted.
# Valid range: 0.0 to 30.0 seconds.
delay_seconds = 0.0

# Require Enter key confirmation before pasting (v0.9+, default: false)
# When true, the app waits for you to press Enter after processing completes.
# Press Escape to cancel. If you don't press Enter or Escape, the paste is cancelled after 30 seconds.
# Useful as an extra safety check to prevent accidental pasting into the wrong window.
require_confirmation = false

# Confirmation timeout in seconds (v0.9+, default: 30.0)
# If require_confirmation is true, how long to wait for the Enter key before cancelling the paste.
# Valid range: 5.0 to 120.0 seconds.
confirmation_timeout_seconds = 30.0

# Automatically press Enter after pasting (default: false)
# When true, simulates pressing Enter after the text is pasted.
# Useful to immediately execute a pasted command in a terminal.
auto_enter = false

# Paste shortcut selection (default: "auto")
# Controls which keyboard shortcut is simulated to paste text:
# - "auto": Detect terminal emulators and use Ctrl+Shift+V, otherwise Ctrl+V.
#   On X11: uses xprop to read WM_CLASS window property.
#   On Wayland/GNOME: attempts GNOME Shell D-Bus detection (may be blocked on GNOME 41+).
#   On Wayland: falls back to Ctrl+V if detection is unavailable. Use Terminal Mode toggle (Ctrl+Alt+M) to switch manually.
# - "ctrl+v": Always use Ctrl+V (standard paste, works in most applications).
# - "ctrl+shift+v": Always use Ctrl+Shift+V (terminal-only paste, overrides auto-detection).
# Use "ctrl+shift+v" if auto-detection fails on your terminal or desktop environment.
paste_shortcut = "auto"

[handsfree]
# Hands-Free Mode (v0.9+)
# Activate voice recording by saying a wake phrase (default: "Hello Cloud")
# instead of using a hotkey. Recording auto-stops when you pause speaking.
# Requires local STT (faster-whisper tiny model).
# WARNING: Wake word detection runs continuously in the background, consuming CPU.
# Only enable if you actively use hands-free mode.

# Enable hands-free mode (default: false)
enabled = false

# Wake phrase to trigger recording (default: "Hello Cloud")
# Say this phrase to start recording. Can be any short phrase.
# Examples: "Hey Voice Paste", "Start recording", "Transcribe"
wake_phrase = "Hello Cloud"

# Wake phrase matching mode (default: "contains")
# - "contains": Wake phrase can be anywhere in the spoken text (most forgiving)
# - "startswith": Recording must start with the wake phrase
# - "fuzzy": Approximate match using fuzzy string matching (tolerates typos)
match_mode = "contains"

# Recording pipeline for hands-free mode (default: "ask_tts")
# - "ask_tts": Record speech -> Send to LLM as question -> Speak answer via TTS
# - "summary": Record speech -> Transcribe -> Summarize -> Paste (normal recording mode)
# - "prompt": Record speech -> Send to LLM as question -> Paste answer
# - "claude_code": Record speech -> Send to Claude Code CLI -> Response via configured mode
pipeline = "ask_tts"

# Silence detection timeout in seconds (default: 3.0)
# After speech is detected, recording stops when silence exceeds this duration.
# Longer values capture extended pauses within a single utterance.
# Valid range: 1.0 to 10.0 seconds.
silence_timeout = 3.0

# Maximum recording duration in seconds (default: 120)
# Recording auto-stops after this duration to prevent runaway recordings.
# Valid range: 10 to 300 seconds.
max_recording_seconds = 120

# Cooldown in seconds after wake word detection (default: 3.0)
# Prevents the wake phrase from re-triggering immediately after a recording.
# Valid range: 1.0 to 10.0 seconds.
cooldown_seconds = 3.0

[tts_cache]
# Cache TTS audio locally to avoid re-synthesis of the same text.
# Saves API credits (ElevenLabs) and reduces latency on repeated playback.
enabled = true
# Maximum total cache size in MB. Oldest entries are evicted when exceeded.
# Valid range: 10 to 2000.
max_size_mb = 200
# Maximum age of unused cache entries in days. Set to 0 to disable age limit.
# Valid range: 0 to 365.
max_age_days = 30
# Maximum number of cached entries. Set to 0 for unlimited (bounded by size).
# Valid range: 0 to 5000.
max_entries = 500

[tts_export]
# TTS Audio Export: save generated audio to a user-chosen folder with
# human-readable filenames. Useful for creating audio collections,
# training material, or any batch TTS output you want to keep.
enabled = false
# Default export directory (empty = ask on first export).
export_path = ""

[claude_code]
# Claude Code CLI integration (requires `claude` in PATH)
# Sends voice input to Claude Code with full project context, CLAUDE.md, and tool use.
# Install: npm install -g @anthropic-ai/claude-code
enabled = false
# Hotkey to trigger Claude Code voice input (default: "ctrl+alt+c")
hotkey = "ctrl+alt+c"
# Working directory for Claude Code (empty = VoicePaste's current directory)
# Set this to your project root so Claude Code has access to CLAUDE.md and project files.
# working_dir = "/path/to/your/project"
# System prompt appended to Claude Code invocations (empty = none)
# system_prompt = "Answer concisely in the same language as the question."
# Response mode: how to deliver Claude's response
# - "paste": paste at cursor position
# - "speak": read aloud via TTS (requires TTS enabled)
# - "both": speak and paste
response_mode = "speak"
# Timeout in seconds for Claude Code to respond (default: 120)
timeout = 120
# Skip permission prompts (--dangerously-skip-permissions).
# Only enable on trusted systems where you don't want to maintain an allowlist.
skip_permissions = false
# Continue conversation: pass --continue on subsequent calls to maintain context.
# When true, Claude remembers previous exchanges in the session.
# Use "New Conversation" in the tray menu to start fresh.
continue_conversation = false

[logging]
# Log level: "DEBUG", "INFO", "WARNING", or "ERROR" (default: "INFO")
# - "DEBUG": Very verbose, includes all state transitions and API details.
# - "INFO": Standard logging, includes important events.
# - "WARNING": Only problems and errors.
# - "ERROR": Only fatal errors.
level = "INFO"
