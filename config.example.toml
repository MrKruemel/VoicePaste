# Voice-to-Summary Paste Tool Configuration
# Copy this file to config.toml and customize as needed.
#
# IMPORTANT: API keys are stored securely in Windows Credential Manager.
# Use the Settings dialog (right-click tray icon > Settings) to manage API keys.
# If you add keys to this file, they will be automatically migrated to Credential Manager on startup.
#
# Never commit config.toml to version control.
# Never share your config.toml file — it contains your API keys.

[hotkey]
# Global hotkey to start/stop recording (default: "ctrl+alt+r")
# Use format: "ctrl+alt+r", "ctrl+shift+v", "windows+shift+a", etc.
# Supported modifiers: ctrl, shift, alt, windows
# Separate multiple modifiers with +. Key names are case-insensitive.
combination = "ctrl+alt+r"

# Voice Prompt hotkey: record speech, send as prompt to LLM, paste answer (default: "ctrl+alt+a")
# Same format as above. Set to empty string to disable Voice Prompt mode.
prompt_combination = "ctrl+alt+a"

# TTS hotkeys (v0.6): only active when TTS is enabled in Settings
# Read clipboard aloud via Text-to-Speech (default: "ctrl+alt+t")
tts_combination = "ctrl+alt+t"
# Ask AI a question and hear the answer via TTS (default: "ctrl+alt+y")
tts_ask_combination = "ctrl+alt+y"

[api]
# Legacy API key location (migrated to Credential Manager automatically in v0.3+)
# Leave this commented out — keys are now managed in Settings dialog > Credentials.
# openai_api_key = ""

[transcription]
# STT backend: "cloud" (OpenAI Whisper API) or "local" (faster-whisper, offline, v0.4+)
# - "cloud": requires OpenAI API key. Fast, excellent quality, requires internet.
# - "local": downloads a Whisper model (~75MB–3GB depending on size). Offline, slower, no API key needed.
backend = "cloud"

# Local model size (only used when backend = "local")
# Options: tiny (~75MB, fast, lower quality)
#          base (~145MB, good quality, recommended)
#          small (~480MB, better quality)
#          medium (~1.5GB, high quality, slow on CPU)
#          large-v2 (~3GB, highest quality, very slow on CPU)
#          large-v3 (~3GB, newest, very slow on CPU)
model_size = "base"

# Compute device for local STT: "cpu" (works everywhere) or "cuda" (NVIDIA GPU, faster)
device = "cpu"

# Quantization for local STT: "int8" (fastest, CPU), "float16" (GPU), "float32" (highest quality)
compute_type = "int8"

# Voice Activity Detection (Silero VAD): skip silence before Whisper inference
# Improves accuracy on long recordings with pauses. Requires onnxruntime.
# Set to false if transcription crashes in the frozen .exe build (onnxruntime issue with PyInstaller).
# Default: true for script, false for frozen .exe (auto-detected at startup).
vad_filter = true

[summarization]
# Enable text cleanup and summarization (default: true)
# When false, raw transcription is pasted without LLM processing.
enabled = true

# Summarization provider (default: "openai")
# Options:
# - "openai": GPT-4o-mini via OpenAI API. Requires OpenAI API key. Cost: ~$0.0001/call.
# - "openrouter": Access multiple models (GPT, Claude, etc.) via OpenRouter API. Requires OpenRouter key.
# - "ollama": Local LLM via Ollama (http://localhost:11434). Requires Ollama running locally. No API key needed.
provider = "openai"

# Model name (default: "gpt-4o-mini" for OpenAI)
# Examples:
# - "gpt-4o-mini" (OpenAI, fast, cost-effective)
# - "openai/gpt-4o-mini" (OpenRouter, same model via OpenRouter)
# - "claude-3-haiku" (OpenRouter, Anthropic Claude)
# - "llama3.2" (Ollama, requires Ollama running locally)
model = "gpt-4o-mini"

# Custom base URL for summarization API (leave empty to use provider default)
# Use this to override the API endpoint:
# - OpenAI default: "https://api.openai.com/v1"
# - OpenRouter: "https://openrouter.ai/api/v1"
# - Ollama: "http://localhost:11434/v1"
base_url = ""

# Custom system prompt for summarization (leave empty to use default)
# The system prompt controls how the LLM cleans up the transcription.
# Default prompt in German: removes filler words (aehm, also, halt), fixes grammar, preserves key info.
# Leave empty to use the default, or set a custom prompt for your use case.
# Example for professional tone:
#   "Rewrite this transcription as a professional, formal paragraph suitable for business email."
custom_prompt = ""

[tts]
# Text-to-Speech via ElevenLabs (v0.6)
# Reads text aloud using natural AI voices. Requires an ElevenLabs API key.
# Enable in Settings dialog or set enabled = true here.
enabled = false

# TTS provider (currently only "elevenlabs" supported)
provider = "elevenlabs"

# ElevenLabs Voice ID (default: "pFZP5JQG7iQjIQuC4Bku" = Lily)
# Browse voices at: https://elevenlabs.io/voice-library
# You can use any voice ID from your ElevenLabs account.
voice_id = "pFZP5JQG7iQjIQuC4Bku"

# ElevenLabs model (default: "eleven_flash_v2_5" = fast, low latency)
# Options:
# - "eleven_flash_v2_5": Fast synthesis, low latency, good quality
# - "eleven_multilingual_v2": Higher quality, supports more languages, slower
model_id = "eleven_flash_v2_5"

# Audio output format
output_format = "mp3_44100_128"

[feedback]
# Play audio cues on recording start/stop (default: true)
# When true, you hear distinct beeps for:
# - Recording start: rising tone (up)
# - Recording stop: falling tone (down)
# - Cancel (Escape): two low beeps
# - Error: single low buzz
# Set to false for silent operation.
audio_cues = true

[logging]
# Log level: "DEBUG", "INFO", "WARNING", or "ERROR" (default: "INFO")
# - "DEBUG": Very verbose, includes all state transitions and API details.
# - "INFO": Standard logging, includes important events.
# - "WARNING": Only problems and errors.
# - "ERROR": Only fatal errors.
level = "INFO"
